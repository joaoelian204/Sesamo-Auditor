<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sésamo Auditor — Dashboard de Seguridad Web">
    <title>🛡️ Sésamo Auditor{% block title_suffix %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <!-- Chart.js para gráficos interactivos de alta calidad -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="navbar-logo">🛡️</span>
            <span class="navbar-title">Sésamo Auditor</span>
        </div>
        <div class="navbar-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/hallazgos" class="nav-link {% if '/hallazgos' in request.path %}active{% endif %}">Hallazgos</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Sésamo Auditor v1.0 — Framework DAST/SAST Reutilizable</p>
    </footer>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
